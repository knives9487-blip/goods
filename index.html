<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>共同記帳 - 預算控管版</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#36A2EB">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root { --primary: #36A2EB; --bg: #f4f7f6; --safe: #36A2EB; --warning: #ff9f40; --danger: #ff4d4d; }
        body { font-family: sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 15px; margin: 0; overflow-x: hidden; }
        
        #pull-to-refresh { position: fixed; top: -60px; left: 0; right: 0; height: 60px; display: flex; align-items: center; justify-content: center; font-size: 0.9rem; color: var(--primary); font-weight: bold; z-index: 1000; transition: transform 0.1s linear; }
        .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(54, 162, 235, 0.3); border-radius: 50%; border-top-color: var(--primary); animation: spin 1s linear infinite; margin-right: 8px; display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .app-card { width: 100%; max-width: 500px; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); position: relative; transition: transform 0.2s cubic-bezier(0,0,0.3,1); }

        /* --- 預算進度條樣式 --- */
        .budget-section { margin-bottom: 20px; cursor: pointer; }
        .budget-info { display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 5px; color: #666; font-weight: bold; }
        .progress-container { width: 100%; height: 12px; background: #eee; border-radius: 10px; overflow: hidden; }
        #progress-bar { width: 0%; height: 100%; background: var(--safe); transition: width 0.5s ease, background-color 0.5s ease; }
        /* ----------------------- */

        .user-selector { display: flex; gap: 10px; margin-bottom: 15px; justify-content: center; }
        .user-btn { flex: 1; padding: 10px; border: 2px solid #eee; border-radius: 20px; background: none; cursor: pointer; font-size: 0.9rem; transition: 0.2s; }
        .user-btn.active { border-color: var(--primary); background: #eef7ff; font-weight: bold; color: var(--primary); }
        
        .filter-section { background: #fdfdfd; padding: 12px; border-radius: 15px; border: 1px dashed #36A2EB; margin: 15px 0; text-align: center; }
        .month-select { padding: 8px 15px; border-radius: 10px; border: 1px solid #36A2EB; font-size: 1rem; color: #36A2EB; font-weight: bold; }

        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; margin-bottom: 10px; font-size: 1rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(80px, 1fr)); gap: 8px; margin-bottom: 20px; }
        .btn-cat { border: none; padding: 12px 2px; border-radius: 10px; background: #f0f0f0; cursor: pointer; display: flex; flex-direction: column; align-items: center; font-size: 0.8rem; }
        .emoji { font-size: 1.3rem; margin-bottom: 4px; }

        .date-group { background: #f8f9fa; padding: 6px 12px; border-radius: 8px; margin: 15px 0 8px 0; font-size: 0.85rem; font-weight: bold; color: #555; display: flex; justify-content: space-between; }
        .day-total { color: #36A2EB; }
        .history-item { padding: 12px; border-bottom: 1px solid #fcfcfc; }
        .history-main { display: flex; justify-content: space-between; align-items: center; }
        .user-tag { font-size: 0.7rem; background: #eee; padding: 2px 6px; border-radius: 4px; margin-left: 5px; color: #666; }
        .del-btn { color: #ff4d4d; border: none; background: none; cursor: pointer; font-size: 1.2rem; }
    </style>
</head>
<body>

<div id="pull-to-refresh">
    <div class="spinner" id="refresh-spinner"></div>
    <span id="refresh-text">⬇️ 下拉以刷新</span>
</div>

<div class="app-card" id="app-content">
    <h2 style="text-align:center; margin-bottom:15px;">💑 共同記帳</h2>

    <div class="budget-section" onclick="setBudget()">
        <div class="budget-info">
            <span id="budget-label">本月預算：$0</span>
            <span id="percent-label">0%</span>
        </div>
        <div class="progress-container">
            <div id="progress-bar"></div>
        </div>
    </div>
    
    <div class="user-selector">
        <button class="user-btn active" id="btn1" onclick="setUser('我')">我</button>
        <button class="user-btn" id="btn2" onclick="setUser('伴侶')">伴侶</button>
    </div>

    <input type="date" id="dateInput">
    <input type="number" id="amountInput" placeholder="輸入金額..." inputmode="decimal">
    <input type="text" id="noteInput" placeholder="備註 (選填)...">
    
    <div class="grid">
        <button class="btn-cat" onclick="save('食', '🍱')"><span class="emoji">🍱</span>食</button>
        <button class="btn-cat" onclick="save('衣', '👕')"><span class="emoji">👕</span>衣</button>
        <button class="btn-cat" onclick="save('住', '🏠')"><span class="emoji">🏠</span>住</button>
        <button class="btn-cat" onclick="save('行', '🚌')"><span class="emoji">🚌</span>行</button>
        <button class="btn-cat" onclick="save('育', '📖')"><span class="emoji">📖</span>育</button>
        <button class="btn-cat" onclick="save('樂', '🎮')"><span class="emoji">🎮</span>樂</button>
        <button class="btn-cat" onclick="save('繳費', '🧧')"><span class="emoji">🧧</span>繳費</button>
        <button class="btn-cat" onclick="save('網購', '🛒')"><span class="emoji">🛒</span>網購</button>
    </div>

    <div class="filter-section">
        <input type="month" id="monthPicker" class="month-select" onchange="renderData()">
    </div>

    <div style="height: 180px;"><canvas id="myChart"></canvas></div>
    <h3 id="totalDisplay" style="text-align:center; color:#333;">該月總計：$0</h3>
    <div id="historyList"></div>
</div>

<script>
    // --- Firebase 配置 ---
    const firebaseConfig = {
        apiKey: "AIzaSyAKP1RNsdH6PzkpG5s_cJKvYiqWw4ogTxM",
        authDomain: "news-7faa3.firebaseapp.com",
        projectId: "news-7faa3",
        storageBucket: "news-7faa3.firebasestorage.app",
        databaseURL: "https://news-7faa3-default-rtdb.firebaseio.com/" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref('our_budget_v4');
    const budgetDb = firebase.database().ref('our_budget_settings'); // 存放預算

    let currentUser = "我";
    let cachedData = null;
    let monthlyBudget = 20000; // 預設 2 萬

    // 設定預算功能
    function setBudget() {
        const val = prompt("請輸入本月預算金額：", monthlyBudget);
        if (val !== null && !isNaN(val) && val > 0) {
            budgetDb.child('monthlyLimit').set(parseFloat(val));
        }
    }

    // 監聽預算變化
    budgetDb.child('monthlyLimit').on('value', (snap) => {
        monthlyBudget = snap.val() || 20000;
        renderData();
    });

    function setUser(u) {
        currentUser = u;
        document.getElementById('btn1').classList.toggle('active', u === '我');
        document.getElementById('btn2').classList.toggle('active', u === '伴侶');
    }

    // 初始化日期
    const now = new Date();
    document.getElementById('dateInput').valueAsDate = now;
    document.getElementById('monthPicker').value = now.toISOString().slice(0, 7);

    // 圖表
    const ctx = document.getElementById('myChart').getContext('2d');
    const chart = new Chart(ctx, {
        type: 'doughnut',
        data: {
            labels: ['食', '衣', '住', '行', '育', '樂', '繳費', '網購'],
            datasets: [{ data: [0,0,0,0,0,0,0,0], backgroundColor: ['#FF6384', '#36A2EB', '#FFCE56', '#4BC0C0', '#9966FF', '#FF9F40', '#E74C3C', '#2ECC71'] }]
        },
        options: { maintainAspectRatio: false, plugins: { legend: { display: false } } }
    });

    function save(cat, emoji) {
        const amt = parseFloat(document.getElementById('amountInput').value);
        if (amt > 0) {
            db.push({ 
                date: document.getElementById('dateInput').value, 
                category: cat, amount: amt, user: currentUser, 
                ts: Date.now(), emoji: emoji, 
                note: document.getElementById('noteInput').value.trim() 
            });
            document.getElementById('amountInput').value = ''; 
            document.getElementById('noteInput').value = '';
        }
    }

    function renderData() {
        if (!cachedData) return;
        const selectedMonth = document.getElementById('monthPicker').value;
        const list = document.getElementById('historyList');
        list.innerHTML = '';
        let totals = { '食':0, '衣':0, '住':0, '行':0, '育':0, '樂':0, '繳費':0, '網購':0 };
        let grandTotal = 0;
        let groups = {};

        Object.keys(cachedData).forEach(k => {
            const item = cachedData[k];
            if (item.date && item.date.startsWith(selectedMonth)) {
                if (!groups[item.date]) groups[item.date] = [];
                groups[item.date].push({ ...item, id: k });
                if(totals.hasOwnProperty(item.category)) totals[item.category] += item.amount;
                grandTotal += item.amount;
            }
        });

        // --- 更新進度條 ---
        const percent = Math.min((grandTotal / monthlyBudget) * 100, 100).toFixed(1);
        const bar = document.getElementById('progress-bar');
        bar.style.width = percent + '%';
        document.getElementById('budget-label').innerText = `本月預算：$${monthlyBudget.toLocaleString()}`;
        document.getElementById('percent-label').innerText = `${percent}% ($${grandTotal.toLocaleString()})`;
        
        // 顏色邏輯：藍 -> 橘 -> 紅
        if (percent < 50) bar.style.backgroundColor = '#36A2EB';
        else if (percent < 80) bar.style.backgroundColor = '#ff9f40';
        else bar.style.backgroundColor = '#ff4d4d';

        // 渲染明細 (排序)
        Object.keys(groups).sort((a, b) => new Date(b) - new Date(a)).forEach(date => {
            let dayHtml = '';
            groups[date].forEach(item => {
                dayHtml += `<div class="history-item"><div class="history-main"><span>${item.emoji} ${item.category} $${item.amount} <span class="user-tag">${item.user}</span></span><button class="del-btn" onclick="db.child('${item.id}').remove()">×</button></div></div>`;
            });
            list.innerHTML += `<div class="date-group">📅 ${date.slice(5)}</div>${dayHtml}`;
        });

        chart.data.datasets[0].data = Object.values(totals);
        chart.update();
        document.getElementById('totalDisplay').innerText = `該月總計：$${grandTotal.toLocaleString()}`;
    }

    db.on('value', (snap) => { cachedData = snap.val(); renderData(); });

    // 下拉刷新邏輯 (略縮，功能同前版本)
    let touchStart = 0;
    window.addEventListener('touchstart', (e) => { if (window.scrollY === 0) touchStart = e.touches[0].pageY; }, {passive: true});
    window.addEventListener('touchmove', (e) => {
        const diff = e.touches[0].pageY - touchStart;
        if (diff > 0 && diff < 100 && window.scrollY === 0) {
            document.getElementById('app-content').style.transform = `translateY(${diff}px)`;
            document.getElementById('pull-to-refresh').style.transform = `translateY(${diff}px)`;
        }
    }, {passive: true});
    window.addEventListener('touchend', () => {
        document.getElementById('app-content').style.transform = '';
        document.getElementById('pull-to-refresh').style.transform = '';
        renderData();
    });
</script>
</body>
</html>
