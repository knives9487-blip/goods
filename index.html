<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>甜蜜帳本 - 大字版</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root { --primary: #FFB7C5; --secondary: #FF8E9D; --bg: #FFF5F7; --safe: #D8A7CA; --warning: #FFB3A7; --danger: #FF4D6D; }
        
        /* 整體字體放大 */
        body { font-family: sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 15px; margin: 0; color: #5D5D5D; font-size: 1.15rem; }
        .app-card { width: 100%; max-width: 500px; background: white; padding: 25px; border-radius: 30px; box-shadow: 0 10px 30px rgba(255, 183, 197, 0.2); }
        
        /* 預算區塊放大 */
        .budget-section { margin-bottom: 25px; background: #FFF9FA; border: 2px solid #FFE0E6; padding: 18px; border-radius: 20px; }
        .budget-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .progress-container { width: 100%; height: 20px; background: #F0F0F0; border-radius: 12px; overflow: hidden; }
        #progress-bar { width: 0%; height: 100%; background: var(--safe); transition: width 0.8s ease; }
        #percent-label { font-size: 1.2rem; font-weight: bold; color: #FF8E9D; }

        /* 使用者選擇器放大 */
        .user-selector { display: flex; gap: 15px; margin-bottom: 20px; }
        .user-wrapper { flex: 1; display: flex; flex-direction: column; gap: 8px; }
        .user-btn { width: 100%; padding: 16px; border: 3px solid #FFE0E6; border-radius: 20px; background: white; cursor: pointer; font-size: 1.25rem; color: #FF8E9D; font-weight: bold; }
        .user-btn.active { border-color: var(--secondary); background: #FF8E9D; color: white; box-shadow: 0 5px 15px rgba(255, 142, 157, 0.3); }
        
        /* 輸入欄位放大 */
        input { width: 100%; padding: 16px; border: 2px solid #FFE0E6; border-radius: 18px; box-sizing: border-box; margin-bottom: 15px; font-size: 1.2rem; outline: none; }
        
        /* 分類按鈕放大 */
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 25px; }
        .btn-cat { border: none; padding: 15px 5px; border-radius: 20px; background: #FFF0F3; cursor: pointer; display: flex; flex-direction: column; align-items: center; font-size: 1.1rem; color: #FF758F; font-weight: bold; }
        .emoji { font-size: 2rem; margin-bottom: 8px; }

        /* Tab 標籤放大 */
        .tab-container { display: flex; justify-content: center; gap: 12px; margin: 25px 0 15px 0; border-bottom: 3px solid #FFF0F3; padding-bottom: 12px; }
        .tab { padding: 10px 20px; border-radius: 12px; font-size: 1.1rem; cursor: pointer; color: #FFB7C5; font-weight: bold; }
        .tab.active { background: #FF8E9D; color: white; }

        /* 明細清單大字化 */
        .date-group { background: #FFF0F3; padding: 12px 18px; border-radius: 15px; margin: 20px 0 10px 0; font-size: 1.15rem; font-weight: bold; color: #FF758F; display: flex; justify-content: space-between; }
        .history-item { padding: 18px; border-bottom: 1.5px solid #FFF0F3; }
        .history-main { display: flex; justify-content: space-between; align-items: center; font-size: 1.2rem; }
        .user-tag { font-size: 0.9rem; background: #FFE0E6; padding: 4px 10px; border-radius: 10px; color: #FF758F; margin-left: 8px; font-weight: bold; }
        .del-btn { color: #FFB3B3; font-size: 1.8rem; border: none; background: none; cursor: pointer; }
        
        /* 支出總計超大字 */
        #totalDisplay { font-size: 2rem; text-align: center; margin: 30px 0; color: #FF8E9D; font-weight: 900; background: #FFF0F3; padding: 15px; border-radius: 20px; }
    </style>
</head>
<body>

<div class="app-card">
    <h1 style="text-align:center; color: #FF758F; font-size: 2rem; margin-bottom: 25px;">🌸 甜蜜帳本</h1>

    <div class="budget-section">
        <div class="budget-header">
            <span style="font-size:1.2rem; font-weight:bold; color:#FF758F;">✨ 預算進度 <span onclick="setBudget()" style="cursor:pointer">⚙️</span></span>
            <span id="percent-label">0%</span>
        </div>
        <div class="progress-container"><div id="progress-bar"></div></div>
        <div id="budget-summary" style="font-size: 1rem; color: #FFB7C5; margin-top: 10px; text-align: right; font-weight: bold;">剩餘：$0</div>
    </div>
    
    <div class="user-selector">
        <div class="user-wrapper">
            <button class="user-btn active" id="btn1" onclick="selectUser(1)">--</button>
            <span style="font-size:0.9rem; text-align:center; color:#FFC1CC; cursor:pointer;" onclick="renameUser(1)">✎ 改名</span>
        </div>
        <div class="user-wrapper">
            <button class="user-btn" id="btn2" onclick="selectUser(2)">--</button>
            <span style="font-size:0.9rem; text-align:center; color:#FFC1CC; cursor:pointer;" onclick="renameUser(2)">✎ 改名</span>
        </div>
    </div>

    <input type="date" id="dateInput">
    <input type="number" id="amountInput" placeholder="輸入金額..." inputmode="decimal">
    <input type="text" id="noteInput" placeholder="備註或是想說的話...">
    
    <div class="grid">
        <button class="btn-cat" onclick="save('食', '🍱')"><span class="emoji">🍱</span>食</button>
        <button class="btn-cat" onclick="save('衣', '👕')"><span class="emoji">👕</span>衣</button>
        <button class="btn-cat" onclick="save('住', '🏠')"><span class="emoji">🏠</span>住</button>
        <button class="btn-cat" onclick="save('行', '🚌')"><span class="emoji">🚌</span>行</button>
        <button class="btn-cat" onclick="save('樂', '🎮')"><span class="emoji">🎮</span>樂</button>
        <button class="btn-cat" onclick="save('繳費', '🧧')"><span class="emoji">🧧</span>繳費</button>
        <button class="btn-cat" onclick="save('超市', '🏢')"><span class="emoji">🏢</span>超市</button>
        <button class="btn-cat" onclick="save('網購', '🛒')"><span class="emoji">🛒</span>網購</button>
    </div>

    <div style="text-align:center;"><input type="month" id="monthPicker" style="width: 80%;" onchange="renderData()"></div>
    
    <div class="tab-container">
        <div class="tab active" id="tab-all" onclick="setFilter('all')">全部</div>
        <div class="tab" id="tab-u1" onclick="setFilter(1)">--</div>
        <div class="tab" id="tab-u2" onclick="setFilter(2)">--</div>
    </div>

    <div id="totalDisplay">月支出：$0</div>
    <div id="historyList"></div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAKP1RNsdH6PzkpG5s_cJKvYiqWw4ogTxM",
        authDomain: "news-7faa3.firebaseapp.com",
        projectId: "news-7faa3",
        storageBucket: "news-7faa3.firebasestorage.app",
        databaseURL: "https://news-7faa3-default-rtdb.firebaseio.com/" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref('our_budget_v4');
    const settingsDb = firebase.database().ref('our_budget_settings');

    let uName1 = "我", uName2 = "伴侶", activeUserIndex = 1, currentFilter = 'all';
    let cachedData = null, monthlyBudget = 20000;

    function renameUser(idx) {
        const newName = prompt("請輸入名稱：", idx === 1 ? uName1 : uName2);
        if (newName?.trim()) settingsDb.child(`user${idx}`).set(newName.trim().substring(0, 8));
    }

    settingsDb.on('value', (snap) => {
        const val = snap.val() || {};
        uName1 = val.user1 || "我";
        uName2 = val.user2 || "伴侶";
        monthlyBudget = val.limit || 20000;
        document.getElementById('btn1').innerText = uName1;
        document.getElementById('btn2').innerText = uName2;
        document.getElementById('tab-u1').innerText = uName1;
        document.getElementById('tab-u2').innerText = uName2;
        renderData();
    });

    function selectUser(idx) {
        activeUserIndex = idx;
        document.getElementById('btn1').classList.toggle('active', idx === 1);
        document.getElementById('btn2').classList.toggle('active', idx === 2);
    }

    function setFilter(filter) {
        currentFilter = filter;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        if (filter === 'all') document.getElementById('tab-all').classList.add('active');
        else if (filter === 1) document.getElementById('tab-u1').classList.add('active');
        else if (filter === 2) document.getElementById('tab-u2').classList.add('active');
        renderData();
    }

    const now = new Date();
    document.getElementById('dateInput').valueAsDate = now;
    document.getElementById('monthPicker').value = now.toISOString().slice(0, 7);

    function save(cat, emoji) {
        const amt = parseFloat(document.getElementById('amountInput').value);
        if (amt > 0) {
            db.push({ 
                date: document.getElementById('dateInput').value, 
                category: cat, amount: amt, userIndex: activeUserIndex,
                ts: Date.now(), emoji: emoji, note: document.getElementById('noteInput').value.trim() 
            });
            document.getElementById('amountInput').value = ''; 
            document.getElementById('noteInput').value = '';
        }
    }

    function renderData() {
        if (!cachedData) return;
        const month = document.getElementById('monthPicker').value;
        const list = document.getElementById('historyList');
        list.innerHTML = '';
        let grandTotal = 0, filteredTotal = 0, groups = {};

        Object.keys(cachedData).forEach(k => {
            const item = cachedData[k];
            if (item.date?.startsWith(month)) {
                grandTotal += item.amount;
                let isMatch = (currentFilter === 'all' || item.userIndex === currentFilter);
                if (!item.userIndex && item.user && currentFilter !== 'all') {
                    const targetName = (currentFilter === 1) ? uName1 : uName2;
                    isMatch = (item.user === targetName);
                }

                if (isMatch) {
                    filteredTotal += item.amount;
                    if (!groups[item.date]) groups[item.date] = [];
                    groups[item.date].push({ ...item, id: k });
                }
            }
        });

        const percent = Math.min((grandTotal / monthlyBudget) * 100, 100).toFixed(1);
        document.getElementById('progress-bar').style.width = percent + '%';
        document.getElementById('percent-label').innerText = `${percent}%`;
        document.getElementById('budget-summary').innerText = `剩餘：$${Math.max(monthlyBudget-grandTotal, 0).toLocaleString()}`;

        const filterName = currentFilter === 'all' ? '月' : (currentFilter === 1 ? uName1 : uName2);
        document.getElementById('totalDisplay').innerText = `${filterName}支出：$${filteredTotal.toLocaleString()}`;

        Object.keys(groups).sort((a, b) => new Date(b) - new Date(a)).forEach(date => {
            let dayHtml = '', dayTotal = 0;
            groups[date].sort((a,b)=>b.ts - a.ts).forEach(item => {
                dayTotal += item.amount;
                let dispName = (item.userIndex === 2) ? uName2 : uName1;
                if (!item.userIndex && item.user) dispName = item.user;
                
                dayHtml += `<div class="history-item"><div class="history-main"><span>${item.emoji} ${item.category} $${item.amount} <span class="user-tag">${dispName}</span></span><button class="del-btn" onclick="if(confirm('要刪除這筆嗎？')) db.child('${item.id}').remove()">×</button></div>${item.note ? `<div style="font-size:1rem; color:#A0A0A0; margin-top:8px;">💬 ${item.note}</div>` : ''}</div>`;
            });
            list.innerHTML += `<div class="date-group"><span>📅 ${date.slice(5)}</span><span>$${dayTotal}</span></div>${dayHtml}`;
        });
    }

    function setBudget() {
        const val = prompt("每月預算：", monthlyBudget);
        if (val && !isNaN(val)) settingsDb.child('limit').set(parseFloat(val));
    }

    db.on('value', (snap) => { cachedData = snap.val(); renderData(); });
</script>
</body>
</html>
