<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我們的共同記帳本</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #36A2EB; --bg: #f4f7f6; }
        body { font-family: sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 15px; margin: 0; }
        .app-card { width: 100%; max-width: 480px; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .user-selector { display: flex; gap: 10px; margin-bottom: 15px; justify-content: center; }
        .user-btn { flex: 1; padding: 10px; border: 2px solid #eee; border-radius: 20px; background: none; cursor: pointer; font-size: 0.9rem; }
        .user-btn.active { border-color: var(--primary); background: #eef7ff; font-weight: bold; color: var(--primary); }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; margin-bottom: 10px; font-size: 1rem; }
        
        /* 網格改為 2x4 或 3x3 以容納第 7 個按鈕 */
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 20px; }
        .btn-cat { border: none; padding: 12px 2px; border-radius: 10px; background: #f0f0f0; cursor: pointer; display: flex; flex-direction: column; align-items: center; font-size: 0.85rem; }
        .btn-cat:active { background: #ddd; transform: scale(0.95); }
        .emoji { font-size: 1.3rem; margin-bottom: 4px; }

        .history-item { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #f9f9f9; align-items: center; }
        .user-tag { font-size: 0.7rem; background: #eee; padding: 2px 6px; border-radius: 4px; margin-left: 5px; color: #666; }
        .del-btn { color: #ff4d4d; border: none; background: none; cursor: pointer; font-size: 1.2rem; padding: 0 10px; }
    </style>
</head>
<body>

<div class="app-card">
    <h2 style="text-align:center; margin-bottom:5px;">💑 共同記帳</h2>
    <p id="connStatus" style="text-align:center; font-size:0.7rem; color:gray; margin-bottom:15px;">連線中...</p>
    
    <div class="user-selector">
        <button class="user-btn active" id="btn1" onclick="setUser('我')">我</button>
        <button class="user-btn" id="btn2" onclick="setUser('伴侶')">伴侶</button>
    </div>

    <input type="date" id="dateInput">
    <input type="number" id="amountInput" placeholder="輸入金額..." inputmode="decimal">
    
    <div class="grid">
        <button class="btn-cat" onclick="save('食', '🍱')"><span class="emoji">🍱</span>食</button>
        <button class="btn-cat" onclick="save('衣', '👕')"><span class="emoji">👕</span>衣</button>
        <button class="btn-cat" onclick="save('住', '🏠')"><span class="emoji">🏠</span>住</button>
        <button class="btn-cat" onclick="save('行', '🚌')"><span class="emoji">🚌</span>行</button>
        <button class="btn-cat" onclick="save('育', '📖')"><span class="emoji">📖</span>育</button>
        <button class="btn-cat" onclick="save('樂', '🎮')"><span class="emoji">🎮</span>樂</button>
        <button class="btn-cat" onclick="save('繳費', '🧧')" style="background: #fff0f0; border: 1px solid #ffcccc;"><span class="emoji">🧧</span>繳費</button>
    </div>

    <div style="height: 220px;"><canvas id="myChart"></canvas></div>
    <h3 id="totalDisplay" style="text-align:center; color:#333; margin: 20px 0;">總計：$0</h3>

    <div style="font-weight:bold; margin-bottom:10px;">📋 最近明細</div>
    <div id="historyList"></div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAKP1RNsdH6PzkpG5s_cJKvYiqWw4ogTxM",
        authDomain: "news-7faa3.firebaseapp.com",
        projectId: "news-7faa3",
        storageBucket: "news-7faa3.firebasestorage.app",
        messagingSenderId: "44090602845",
        appId: "1:44090602845:web:a8878ca2d763ac37ffa4b4",
        measurementId: "G-Y59EXMHTNJ",
        databaseURL: "https://news-7faa3-default-rtdb.firebaseio.com/" 
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref('our_budget_v3');

    let currentUser = "我";
    document.getElementById('dateInput').valueAsDate = new Date();

    function setUser(u) {
        currentUser = u;
        document.getElementById('btn1').classList.toggle('active', u === '我');
        document.getElementById('btn2').classList.toggle('active', u === '伴侶');
    }

    const ctx = document.getElementById('myChart').getContext('2d');
    const chart = new Chart(ctx, {
        type: 'doughnut',
        data: {
            labels: ['食', '衣', '住', '行', '育', '樂', '繳費'],
            datasets: [{ 
                data: [0,0,0,0,0,0,0], 
                backgroundColor: ['#FF6384', '#36A2EB', '#FFCE56', '#4BC0C0', '#9966FF', '#FF9F40', '#E74C3C'] 
            }]
        },
        options: { maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { boxWidth: 12 } } } }
    });

    function save(cat, emoji) {
        const amt = parseFloat(document.getElementById('amountInput').value);
        const date = document.getElementById('dateInput').value;
        if (amt > 0) {
            db.push({ date, category: cat, amount: amt, user: currentUser, ts: Date.now(), emoji: emoji });
            document.getElementById('amountInput').value = '';
        } else {
            alert("請輸入金額");
        }
    }

    db.on('value', (snap) => {
        const data = snap.val();
        const list = document.getElementById('historyList');
        list.innerHTML = '';
        let totals = { '食':0, '衣':0, '住':0, '行':0, '育':0, '樂':0, '繳費':0 };
        let grandTotal = 0;

        if (data) {
            document.getElementById('connStatus').innerText = "● 雲端已同步";
            const keys = Object.keys(data).sort((a,b) => data[b].ts - data[a].ts);
            keys.forEach(k => {
                const item = data[k];
                if(totals.hasOwnProperty(item.category)) totals[item.category] += item.amount;
                grandTotal += item.amount;
                list.innerHTML += `<div class="history-item">
                    <span>${item.date.split('-').slice(1).join('/')} ${item.emoji} $${item.amount} <span class="user-tag">${item.user}</span></span>
                    <button class="del-btn" onclick="if(confirm('要刪除嗎？')) firebase.database().ref('our_budget_v3').child('${k}').remove()">×</button>
                </div>`;
            });
        }
        chart.data.datasets[0].data = Object.values(totals);
        chart.update();
        document.getElementById('totalDisplay').innerText = `總計：$${grandTotal.toLocaleString()}`;
    });
</script>

</body>
</html>
