<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>共同記帳 - 預算自訂版</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#36A2EB">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root { --primary: #36A2EB; --bg: #f4f7f6; --safe: #36A2EB; --warning: #ff9f40; --danger: #ff4d4d; }
        body { font-family: sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 15px; margin: 0; overflow-x: hidden; }
        
        /* App 卡片容器 */
        .app-card { width: 100%; max-width: 500px; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); position: relative; }

        /* --- 預算區塊優化 --- */
        .budget-section { 
            margin-bottom: 20px; background: #fff; border: 1px solid #eee; padding: 15px; border-radius: 15px; 
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }
        .budget-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .budget-title { font-size: 0.9rem; font-weight: bold; color: #444; display: flex; align-items: center; gap: 5px; }
        .setting-icon { cursor: pointer; color: #aaa; font-size: 1rem; transition: 0.2s; }
        .setting-icon:hover { color: var(--primary); }
        
        .budget-value { font-size: 0.8rem; color: #888; }
        .progress-container { width: 100%; height: 14px; background: #eee; border-radius: 10px; overflow: hidden; }
        #progress-bar { width: 0%; height: 100%; background: var(--safe); transition: width 0.6s cubic-bezier(0.1, 0.7, 0.1, 1); }
        /* ----------------------- */

        .user-selector { display: flex; gap: 10px; margin-bottom: 15px; }
        .user-btn { flex: 1; padding: 12px; border: 2px solid #eee; border-radius: 15px; background: none; cursor: pointer; font-size: 0.9rem; }
        .user-btn.active { border-color: var(--primary); background: #eef7ff; font-weight: bold; color: var(--primary); }
        
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 12px; box-sizing: border-box; margin-bottom: 10px; font-size: 1rem; outline: none; }
        input:focus { border-color: var(--primary); }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(80px, 1fr)); gap: 8px; margin-bottom: 20px; }
        .btn-cat { border: none; padding: 12px 2px; border-radius: 12px; background: #f5f5f5; cursor: pointer; display: flex; flex-direction: column; align-items: center; font-size: 0.8rem; }
        .btn-cat:active { transform: scale(0.95); background: #eee; }
        .emoji { font-size: 1.4rem; margin-bottom: 4px; }

        .filter-section { margin-bottom: 15px; text-align: center; }
        .month-select { padding: 8px 12px; border-radius: 10px; border: 1px solid #ddd; font-weight: bold; color: var(--primary); background: white; cursor: pointer; }

        .date-group { background: #f8f9fa; padding: 8px 12px; border-radius: 10px; margin: 15px 0 8px 0; font-size: 0.85rem; font-weight: bold; display: flex; justify-content: space-between; }
        .history-item { padding: 12px; border-bottom: 1px solid #f9f9f9; }
        .history-main { display: flex; justify-content: space-between; align-items: center; }
        .history-note { font-size: 0.8rem; color: #999; margin-top: 5px; padding-left: 2px; }
        .user-tag { font-size: 0.7rem; background: #eef7ff; padding: 2px 6px; border-radius: 5px; color: var(--primary); margin-left: 5px; }
        .action-btns { display: flex; gap: 12px; }
        .edit-btn { color: var(--primary); border: none; background: none; cursor: pointer; font-size: 1rem; }
        .del-btn { color: #ff4d4d; border: none; background: none; cursor: pointer; font-size: 1.2rem; }
    </style>
</head>
<body>

<div class="app-card">
    <h2 style="text-align:center; margin-bottom:20px; color: #333;">💑 我們的帳本</h2>

    <div class="budget-section">
        <div class="budget-header">
            <div class="budget-title">
                📊 本月預算進度 
                <span class="setting-icon" onclick="setBudget()" title="設定預算">⚙️</span>
            </div>
            <div class="budget-value" id="percent-label">0%</div>
        </div>
        <div class="progress-container">
            <div id="progress-bar"></div>
        </div>
        <div id="budget-summary" style="font-size: 0.75rem; color: #999; margin-top: 8px; text-align: right;">
            剩餘額度：$0 / 總預算：$0
        </div>
    </div>
    
    <div class="user-selector">
        <button class="user-btn active" id="btn1" onclick="setUser('我')">我</button>
        <button class="user-btn" id="btn2" onclick="setUser('伴侶')">伴侶</button>
    </div>

    <input type="date" id="dateInput">
    <input type="number" id="amountInput" placeholder="輸入金額..." inputmode="decimal">
    <input type="text" id="noteInput" placeholder="備註內容 (選填)...">
    
    <div class="grid">
        <button class="btn-cat" onclick="save('食', '🍱')"><span class="emoji">🍱</span>食</button>
        <button class="btn-cat" onclick="save('衣', '👕')"><span class="emoji">👕</span>衣</button>
        <button class="btn-cat" onclick="save('住', '🏠')"><span class="emoji">🏠</span>住</button>
        <button class="btn-cat" onclick="save('行', '🚌')"><span class="emoji">🚌</span>行</button>
        <button class="btn-cat" onclick="save('樂', '🎮')"><span class="emoji">🎮</span>樂</button>
        <button class="btn-cat" onclick="save('超市', '🛒')"><span class="emoji">🛒</span>超市</button>
        <button class="btn-cat" onclick="save('繳費', '🧧')"><span class="emoji">🧧</span>繳費</button>
        <button class="btn-cat" onclick="save('其他', '✨')"><span class="emoji">✨</span>其他</button>
    </div>

    <div class="filter-section">
        <input type="month" id="monthPicker" class="month-select" onchange="renderData()">
    </div>

    <div style="height: 180px;"><canvas id="myChart"></canvas></div>
    <h3 id="totalDisplay" style="text-align:center; color:#333; margin: 20px 0;">月支出：$0</h3>
    <div id="historyList"></div>
</div>

<script>
    // Firebase 配置
    const firebaseConfig = {
        apiKey: "AIzaSyAKP1RNsdH6PzkpG5s_cJKvYiqWw4ogTxM",
        authDomain: "news-7faa3.firebaseapp.com",
        projectId: "news-7faa3",
        storageBucket: "news-7faa3.firebasestorage.app",
        databaseURL: "https://news-7faa3-default-rtdb.firebaseio.com/" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref('our_budget_v4');
    const settingsDb = firebase.database().ref('our_budget_settings');

    let currentUser = "我", cachedData = null, monthlyBudget = 20000;

    // 設定預算函式
    function setBudget() {
        const val = prompt("請設定每月的預算上限：", monthlyBudget);
        if (val !== null && !isNaN(val) && val > 0) {
            settingsDb.child('limit').set(parseFloat(val));
        }
    }

    // 監聽雲端預算設定
    settingsDb.child('limit').on('value', (snap) => {
        monthlyBudget = snap.val() || 20000;
        renderData();
    });

    function setUser(u) {
        currentUser = u;
        document.getElementById('btn1').classList.toggle('active', u === '我');
        document.getElementById('btn2').classList.toggle('active', u === '伴侶');
    }

    const now = new Date();
    document.getElementById('dateInput').valueAsDate = now;
    document.getElementById('monthPicker').value = now.toISOString().slice(0, 7);

    const ctx = document.getElementById('myChart').getContext('2d');
    const chart = new Chart(ctx, {
        type: 'doughnut',
        data: {
            labels: ['食', '衣', '住', '行', '樂', '超市', '繳費', '其他'],
            datasets: [{ data: [0,0,0,0,0,0,0,0], backgroundColor: ['#FF6384', '#36A2EB', '#FFCE56', '#4BC0C0', '#9966FF', '#FF9F40', '#E74C3C', '#BDC3C7'] }]
        },
        options: { maintainAspectRatio: false, plugins: { legend: { display: false } } }
    });

    function save(cat, emoji) {
        const amt = parseFloat(document.getElementById('amountInput').value);
        if (amt > 0) {
            db.push({ 
                date: document.getElementById('dateInput').value, 
                category: cat, amount: amt, user: currentUser, 
                ts: Date.now(), emoji: emoji, 
                note: document.getElementById('noteInput').value.trim() 
            });
            document.getElementById('amountInput').value = ''; 
            document.getElementById('noteInput').value = '';
        }
    }

    function editItem(id) {
        const item = cachedData[id];
        const newAmt = prompt("修改金額：", item.amount);
        if (newAmt !== null && !isNaN(newAmt)) {
            const newNote = prompt("修改備註：", item.note || "");
            if (newNote !== null) db.child(id).update({ amount: parseFloat(newAmt), note: newNote.trim() });
        }
    }

    function renderData() {
        if (!cachedData) return;
        const selectedMonth = document.getElementById('monthPicker').value;
        const list = document.getElementById('historyList');
        list.innerHTML = '';
        let totals = { '食':0, '衣':0, '住':0, '行':0, '樂':0, '超市':0, '繳費':0, '其他':0 };
        let grandTotal = 0, groups = {};

        Object.keys(cachedData).forEach(k => {
            const item = cachedData[k];
            if (item.date && item.date.startsWith(selectedMonth)) {
                if (!groups[item.date]) groups[item.date] = [];
                groups[item.date].push({ ...item, id: k });
                if(totals.hasOwnProperty(item.category)) totals[item.category] += item.amount;
                grandTotal += item.amount;
            }
        });

        // 進度條與餘額計算
        const percent = Math.min((grandTotal / monthlyBudget) * 100, 100).toFixed(1);
        const remaining = Math.max(monthlyBudget - grandTotal, 0);
        const bar = document.getElementById('progress-bar');
        bar.style.width = percent + '%';
        bar.style.backgroundColor = percent < 50 ? '#36A2EB' : (percent < 85 ? '#ff9f40' : '#ff4d4d');
        
        document.getElementById('percent-label').innerText = `${percent}%`;
        document.getElementById('budget-summary').innerText = `剩餘：$${remaining.toLocaleString()} / 總預算：$${monthlyBudget.toLocaleString()}`;

        // 明細列表
        Object.keys(groups).sort((a, b) => new Date(b) - new Date(a)).forEach(date => {
            let dayHtml = '', dayTotal = 0;
            groups[date].sort((a,b)=>b.ts - a.ts).forEach(item => {
                dayTotal += item.amount;
                const noteHtml = item.note ? `<div class="history-note">💬 ${item.note}</div>` : '';
                dayHtml += `<div class="history-item"><div class="history-main"><span>${item.emoji} ${item.category} $${item.amount} <span class="user-tag">${item.user}</span></span><div class="action-btns"><button class="edit-btn" onclick="editItem('${item.id}')">✏️</button><button class="del-btn" onclick="if(confirm('要刪除嗎？')) db.child('${item.id}').remove()">×</button></div></div>${noteHtml}</div>`;
            });
            list.innerHTML += `<div class="date-group"><span>📅 ${date.slice(5)}</span><span>日計: $${dayTotal}</span></div>${dayHtml}`;
        });

        chart.data.datasets[0].data = Object.values(totals);
        chart.update();
        document.getElementById('totalDisplay').innerText = `月支出：$${grandTotal.toLocaleString()}`;
    }

    db.on('value', (snap) => { cachedData = snap.val(); renderData(); });
</script>
</body>
</html>
