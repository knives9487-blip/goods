<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>甜蜜帳本</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root { --primary: #FFB7C5; --secondary: #FF8E9D; --bg: #FFF5F7; --safe: #D8A7CA; --warning: #FFB3A7; --danger: #FF4D6D; }
        body { font-family: sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 0; margin: 0; color: #5D5D5D; overflow-x: hidden; }
        
        /* 下拉刷新樣式 */
        #ptr-element { 
            position: absolute; top: -60px; left: 0; width: 100%; height: 60px; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 1.5rem; transition: transform 0.2s; z-index: 10;
        }
        .refreshing #ptr-element { transform: translateY(60px); }
        .ptr-icon { transition: transform 0.2s; color: var(--secondary); }
        
        #main-content { transition: transform 0.3s cubic-bezier(0,0,0.31,1); width: 100%; max-width: 500px; }
        .app-card { background: white; padding: 20px; border-radius: 0 0 25px 25px; box-shadow: 0 10px 30px rgba(255, 183, 197, 0.2); min-height: 100vh; box-sizing: border-box; }
        
        /* 預算與 UI 樣式 */
        .budget-section { margin-bottom: 20px; background: #FFF9FA; border: 1.5px solid #FFE0E6; padding: 15px; border-radius: 20px; }
        .budget-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .progress-container { width: 100%; height: 14px; background: #F0F0F0; border-radius: 10px; overflow: hidden; }
        #progress-bar { width: 0%; height: 100%; background: var(--safe); transition: all 0.5s ease; }
        .budget-footer { display: flex; justify-content: space-between; margin-top: 8px; font-size: 0.8rem; font-weight: bold; }

        .chart-container { position: relative; height: 180px; width: 100%; margin: 10px 0; }
        .user-selector { display: flex; gap: 10px; margin-bottom: 15px; }
        .user-btn { flex: 1; padding: 12px; border: 2px solid #FFE0E6; border-radius: 18px; background: white; cursor: pointer; font-size: 0.95rem; color: #FF8E9D; font-weight: bold; }
        .user-btn.active { border-color: var(--secondary); background: #FF8E9D; color: white; }
        
        input { width: 100%; padding: 12px; border: 1.5px solid #FFE0E6; border-radius: 15px; box-sizing: border-box; margin-bottom: 10px; font-size: 1rem; outline: none; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
        .btn-cat { border: none; padding: 12px 2px; border-radius: 18px; background: #FFF0F3; cursor: pointer; display: flex; flex-direction: column; align-items: center; font-size: 0.85rem; color: #FF758F; }
        .emoji { font-size: 1.5rem; margin-bottom: 5px; }

        .tab-container { display: flex; justify-content: center; gap: 10px; margin: 10px 0; border-bottom: 2px solid #FFF0F3; padding-bottom: 10px; }
        .tab { padding: 8px 15px; border-radius: 10px; font-size: 0.9rem; cursor: pointer; color: #FFB7C5; font-weight: bold; }
        .tab.active { background: #FF8E9D; color: white; }

        .date-group { background: #FFF0F3; padding: 10px 15px; border-radius: 12px; margin: 15px 0 8px 0; font-size: 0.9rem; font-weight: bold; color: #FF758F; display: flex; justify-content: space-between; }
        .history-item { padding: 14px; border-bottom: 1px solid #FFF0F3; }
        .history-main { display: flex; justify-content: space-between; align-items: center; }
        .user-tag { font-size: 0.75rem; background: #FFE0E6; padding: 3px 8px; border-radius: 8px; color: #FF758F; margin-left: 6px; }
        .action-btns { display: flex; align-items: center; gap: 12px; }
        .edit-btn { color: #A7C7E7; font-size: 1.2rem; border: none; background: none; cursor: pointer; }
        .del-btn { color: #FFB3B3; font-size: 1.4rem; border: none; background: none; cursor: pointer; }
        
        #totalDisplay { font-size: 1.4rem; text-align: center; margin: 15px 0; color: #FF8E9D; font-weight: bold; }
        
        /* 旋轉動畫 */
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .spinning { animation: spin 1s linear infinite; }
    </style>
</head>
<body>

<div id="ptr-element"><span class="ptr-icon" id="ptr-icon">🌸</span></div>

<div id="main-content">
    <div class="app-card">
        <h2 style="text-align:center; color: #FF758F; margin-top: 0;">🌸 甜蜜帳本</h2>

        <div class="budget-section">
            <div class="budget-header">
                <span style="font-size:0.9rem; font-weight:bold; color:#FF758F;">✨ 預算進度 <span onclick="setBudget()" style="cursor:pointer">⚙️</span></span>
                <span id="percent-label" style="font-size:0.85rem; font-weight:bold;">0%</span>
            </div>
            <div class="progress-container"><div id="progress-bar"></div></div>
            <div class="budget-footer">
                <span id="used-display" style="color: #FF8E9D;">已用: $0</span>
                <span id="remain-display" style="color: #D8A7CA;">剩餘: $0</span>
            </div>
        </div>
        
        <div class="user-selector">
            <div style="flex:1; display:flex; flex-direction:column; gap:5px;">
                <button class="user-btn active" id="btn1" onclick="selectUser(1)">--</button>
                <span style="font-size:0.7rem; text-align:center; color:#FFC1CC; cursor:pointer;" onclick="renameUser(1)">✎ 改名</span>
            </div>
            <div style="flex:1; display:flex; flex-direction:column; gap:5px;">
                <button class="user-btn" id="btn2" onclick="selectUser(2)">--</button>
                <span style="font-size:0.7rem; text-align:center; color:#FFC1CC; cursor:pointer;" onclick="renameUser(2)">✎ 改名</span>
            </div>
        </div>

        <input type="date" id="dateInput">
        <input type="number" id="amountInput" placeholder="金額" inputmode="decimal">
        <input type="text" id="noteInput" placeholder="備註...">
        
        <div class="grid">
            <button class="btn-cat" onclick="save('食', '🍱')"><span class="emoji">🍱</span>食</button>
            <button class="btn-cat" onclick="save('衣', '👕')"><span class="emoji">👕</span>衣</button>
            <button class="btn-cat" onclick="save('住', '🏠')"><span class="emoji">🏠</span>住</button>
            <button class="btn-cat" onclick="save('行', '🚌')"><span class="emoji">🚌</span>行</button>
            <button class="btn-cat" onclick="save('樂', '🎮')"><span class="emoji">🎮</span>樂</button>
            <button class="btn-cat" onclick="save('繳費', '🧧')"><span class="emoji">🧧</span>繳費</button>
            <button class="btn-cat" onclick="save('超市', '🏢')"><span class="emoji">🏢</span>超市</button>
            <button class="btn-cat" onclick="save('網購', '🛒')"><span class="emoji">🛒</span>網購</button>
        </div>

        <div style="text-align:center;"><input type="month" id="monthPicker" style="width: auto;" onchange="renderData()"></div>
        <div class="chart-container"><canvas id="myChart"></canvas></div>

        <div class="tab-container">
            <div class="tab active" id="tab-all" onclick="setFilter('all')">全部</div>
            <div class="tab" id="tab-u1" onclick="setFilter(1)">--</div>
            <div class="tab" id="tab-u2" onclick="setFilter(2)">--</div>
        </div>

        <div id="totalDisplay">月支出：$0</div>
        <div id="historyList"></div>
    </div>
</div>

<script>
    // --- Firebase 配置 ---
    const firebaseConfig = {
        apiKey: "AIzaSyAKP1RNsdH6PzkpG5s_cJKvYiqWw4ogTxM",
        authDomain: "news-7faa3.firebaseapp.com",
        projectId: "news-7faa3",
        storageBucket: "news-7faa3.firebasestorage.app",
        databaseURL: "https://news-7faa3-default-rtdb.firebaseio.com/" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref('our_budget_v4');
    const settingsDb = firebase.database().ref('our_budget_settings');

    let uName1 = "我", uName2 = "伴侶", activeUserIndex = 1, currentFilter = 'all';
    let cachedData = null, monthlyBudget = 20000, myChart = null;

    // --- 下拉刷新邏輯 ---
    let startY = 0;
    const content = document.getElementById('main-content');
    const ptrIcon = document.getElementById('ptr-icon');

    window.addEventListener('touchstart', (e) => {
        if (window.scrollY === 0) startY = e.touches[0].pageY;
    }, {passive: true});

    window.addEventListener('touchmove', (e) => {
        const moveY = e.touches[0].pageY;
        const diff = moveY - startY;
        if (window.scrollY === 0 && diff > 0) {
            const pullDistance = Math.min(diff / 2, 80);
            content.style.transform = `translateY(${pullDistance}px)`;
            ptrIcon.style.transform = `rotate(${pullDistance * 5}deg)`;
            if (diff > 150) ptrIcon.innerText = "✨"; else ptrIcon.innerText = "🌸";
        }
    }, {passive: true});

    window.addEventListener('touchend', (e) => {
        const diff = e.changedTouches[0].pageY - startY;
        if (window.scrollY === 0 && diff > 150) {
            content.style.transform = `translateY(60px)`;
            ptrIcon.classList.add('spinning');
            ptrIcon.innerText = "⏳";
            
            // 模擬刷新數據
            db.once('value', (snap) => {
                cachedData = snap.val();
                renderData();
                setTimeout(() => {
                    content.style.transform = `translateY(0)`;
                    ptrIcon.classList.remove('spinning');
                    ptrIcon.innerText = "🌸";
                }, 600);
            });
        } else {
            content.style.transform = `translateY(0)`;
        }
    });

    // --- 核心邏輯 (圖表、存檔、編輯等) ---
    function initChart() {
        const ctx = document.getElementById('myChart').getContext('2d');
        myChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['食', '衣', '住', '行', '樂', '繳費', '超市', '網購'],
                datasets: [{
                    data: [0,0,0,0,0,0,0,0],
                    backgroundColor: ['#FFADAD', '#FFD6A5', '#FDFFB6', '#CAFFBF', '#9BF6FF', '#A0C4FF', '#BDB2FF', '#FFC6FF']
                }]
            },
            options: { maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: { boxWidth: 10, font: { size: 10 } } } } }
        });
    }

    settingsDb.on('value', (snap) => {
        const val = snap.val() || {};
        uName1 = val.user1 || "我"; uName2 = val.user2 || "伴侶";
        monthlyBudget = val.limit || 20000;
        document.getElementById('btn1').innerText = uName1;
        document.getElementById('btn2').innerText = uName2;
        document.getElementById('tab-u1').innerText = uName1;
        document.getElementById('tab-u2').innerText = uName2;
        renderData();
    });

    function selectUser(idx) {
        activeUserIndex = idx;
        document.getElementById('btn1').classList.toggle('active', idx === 1);
        document.getElementById('btn2').classList.toggle('active', idx === 2);
    }

    function setFilter(filter) {
        currentFilter = filter;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        if (filter === 'all') document.getElementById('tab-all').classList.add('active');
        else if (filter === 1) document.getElementById('tab-u1').classList.add('active');
        else if (filter === 2) document.getElementById('tab-u2').classList.add('active');
        renderData();
    }

    function save(cat, emoji) {
        const amt = parseFloat(document.getElementById('amountInput').value);
        if (amt > 0) {
            db.push({ 
                date: document.getElementById('dateInput').value, 
                category: cat, amount: amt, userIndex: activeUserIndex,
                ts: Date.now(), emoji: emoji, note: document.getElementById('noteInput').value.trim() 
            });
            document.getElementById('amountInput').value = ''; 
            document.getElementById('noteInput').value = '';
        }
    }

    function editItem(id) {
        const item = cachedData[id];
        if (!item) return;
        const nAmt = prompt("金額：", item.amount);
        if (nAmt === null) return;
        const nCat = prompt("分類(食,衣,住,行,樂,繳費,超市,網購)：", item.category);
        if (nCat === null) return;
        const nNote = prompt("備註：", item.note || "");
        if (nNote === null) return;

        const emojiMap = { '食':'🍱','衣':'👕','住':'🏠','行':'🚌','樂':'🎮','繳費':'🧧','超市':'🏢','網購':'🛒' };
        db.child(id).update({
            amount: parseFloat(nAmt) || item.amount,
            category: nCat || item.category,
            note: nNote.trim(),
            emoji: emojiMap[nCat] || item.emoji
        });
    }

    function renderData() {
        if (!cachedData) return;
        const month = document.getElementById('monthPicker').value;
        const list = document.getElementById('historyList');
        list.innerHTML = '';
        let gt = 0, ft = 0, groups = {};
        let cats = { '食':0, '衣':0, '住':0, '行':0, '樂':0, '繳費':0, '超市':0, '網購':0 };

        Object.keys(cachedData).forEach(k => {
            const item = cachedData[k];
            if (item.date?.startsWith(month)) {
                gt += item.amount;
                let isMatch = (currentFilter === 'all');
                if (!isMatch) {
                    if (item.userIndex !== undefined) isMatch = (item.userIndex === currentFilter);
                    else if (item.user) isMatch = (item.user === (currentFilter === 1 ? uName1 : uName2));
                }
                if (isMatch) {
                    ft += item.amount;
                    if (cats.hasOwnProperty(item.category)) cats[item.category] += item.amount;
                    if (!groups[item.date]) groups[item.date] = [];
                    groups[item.date].push({ ...item, id: k });
                }
            }
        });

        if (myChart) { myChart.data.datasets[0].data = Object.values(cats); myChart.update(); }

        const p = (gt / monthlyBudget) * 100;
        const bar = document.getElementById('progress-bar');
        const lbl = document.getElementById('percent-label');
        bar.style.width = Math.min(p, 100) + '%';
        lbl.innerText = p.toFixed(1) + '%';
        
        document.getElementById('used-display').innerText = `已用: $${gt.toLocaleString()}`;
        document.getElementById('remain-display').innerText = `剩餘: $${Math.max(0, monthlyBudget - gt).toLocaleString()}`;

        if (p < 50) { bar.style.background = "var(--safe)"; lbl.style.color = "var(--safe)"; }
        else if (p < 80) { bar.style.background = "var(--warning)"; lbl.style.color = "var(--warning)"; }
        else { bar.style.background = "var(--danger)"; lbl.style.color = "var(--danger)"; }

        document.getElementById('totalDisplay').innerText = `${currentFilter==='all'?'月':(currentFilter===1?uName1:uName2)}支出：$${ft.toLocaleString()}`;

        Object.keys(groups).sort((a,b)=>new Date(b)-new Date(a)).forEach(date => {
            let dHtml = '', dTotal = 0;
            groups[date].sort((a,b)=>b.ts-a.ts).forEach(i => {
                dTotal += i.amount;
                let dN = (i.userIndex === 2) ? uName2 : uName1;
                if (i.userIndex === undefined && i.user) dN = i.user;
                dHtml += `<div class="history-item">
                    <div class="history-main">
                        <span>${i.emoji} ${i.category} <b>$${i.amount}</b> <span class="user-tag">${dN}</span></span>
                        <div class="action-btns">
                            <button class="edit-btn" onclick="editItem('${i.id}')">✎</button>
                            <button class="del-btn" onclick="if(confirm('刪除？')) db.child('${i.id}').remove()">×</button>
                        </div>
                    </div>
                    ${i.note?`<div style="font-size:0.8rem;color:#999;margin-top:5px;">💬 ${i.note}</div>`:''}
                </div>`;
            });
            list.innerHTML += `<div class="date-group"><span>📅 ${date.slice(5)}</span><span>$${dTotal}</span></div>${dHtml}`;
        });
    }

    function setBudget() {
        const v = prompt("每月預算：", monthlyBudget);
        if (v && !isNaN(v)) settingsDb.child('limit').set(parseFloat(v));
    }

    function renameUser(idx) {
        const n = prompt("名稱：", idx === 1 ? uName1 : uName2);
        if (n?.trim()) settingsDb.child(`user${idx}`).set(n.trim().substring(0, 8));
    }

    const today = new Date();
    document.getElementById('dateInput').valueAsDate = today;
    document.getElementById('monthPicker').value = today.toISOString().slice(0, 7);
    window.onload = () => { initChart(); db.on('value', (snap) => { cachedData = snap.val(); renderData(); }); };
</script>
</body>
</html>
