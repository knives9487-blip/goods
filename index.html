<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>共同記帳 - 當月統計版</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #36A2EB; --bg: #f4f7f6; }
        body { font-family: sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 15px; margin: 0; }
        .app-card { width: 100%; max-width: 500px; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .user-selector { display: flex; gap: 10px; margin-bottom: 15px; justify-content: center; }
        .user-btn { flex: 1; padding: 10px; border: 2px solid #eee; border-radius: 20px; background: none; cursor: pointer; font-size: 0.9rem; }
        .user-btn.active { border-color: var(--primary); background: #eef7ff; font-weight: bold; color: var(--primary); }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; margin-bottom: 10px; font-size: 1rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(80px, 1fr)); gap: 8px; margin-bottom: 20px; }
        .btn-cat { border: none; padding: 12px 2px; border-radius: 10px; background: #f0f0f0; cursor: pointer; display: flex; flex-direction: column; align-items: center; font-size: 0.8rem; }
        .btn-cat:active { background: #ddd; transform: scale(0.95); }
        .emoji { font-size: 1.3rem; margin-bottom: 4px; }
        .month-label { text-align: center; color: var(--primary); font-weight: bold; margin-bottom: 10px; font-size: 1.1rem; }
        .history-item { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #f9f9f9; align-items: center; }
        .user-tag { font-size: 0.7rem; background: #eee; padding: 2px 6px; border-radius: 4px; margin-left: 5px; color: #666; }
        .del-btn { color: #ff4d4d; border: none; background: none; cursor: pointer; font-size: 1.2rem; padding: 0 10px; }
    </style>
</head>
<body>

<div class="app-card">
    <h2 style="text-align:center; margin-bottom:5px;">💑 共同記帳</h2>
    <div class="month-label" id="currentMonthDisplay"></div>
    
    <div class="user-selector">
        <button class="user-btn active" id="btn1" onclick="setUser('我')">我</button>
        <button class="user-btn" id="btn2" onclick="setUser('伴侶')">伴侶</button>
    </div>

    <input type="date" id="dateInput">
    <input type="number" id="amountInput" placeholder="輸入金額..." inputmode="decimal">
    
    <div class="grid">
        <button class="btn-cat" onclick="save('食', '🍱')"><span class="emoji">🍱</span>食</button>
        <button class="btn-cat" onclick="save('衣', '👕')"><span class="emoji">👕</span>衣</button>
        <button class="btn-cat" onclick="save('住', '🏠')"><span class="emoji">🏠</span>住</button>
        <button class="btn-cat" onclick="save('行', '🚌')"><span class="emoji">🚌</span>行</button>
        <button class="btn-cat" onclick="save('育', '📖')"><span class="emoji">📖</span>育</button>
        <button class="btn-cat" onclick="save('樂', '🎮')"><span class="emoji">🎮</span>樂</button>
        <button class="btn-cat" onclick="save('繳費', '🧧')"><span class="emoji">🧧</span>繳費</button>
        <button class="btn-cat" onclick="save('網購', '🛒')"><span class="emoji">🛒</span>網購</button>
        <button class="btn-cat" onclick="save('超市', '🏢')"><span class="emoji">🏢</span>超市</button>
        <button class="btn-cat" onclick="save('貸款', '🏦')"><span class="emoji">🏦</span>貸款</button>
    </div>

    <div style="height: 220px;"><canvas id="myChart"></canvas></div>
    <h3 id="totalDisplay" style="text-align:center; color:#333; margin: 20px 0;">本月總計：$0</h3>

    <div style="font-weight:bold; margin-bottom:10px;">📋 最近明細 (顯示全部)</div>
    <div id="historyList"></div>
</div>
